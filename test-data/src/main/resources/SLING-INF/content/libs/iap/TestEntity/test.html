<!--/*
  Renders a test entity through its Entity model, exercising both the inherited
  Content accessors (path, name, created) and the iap:Entity-specific ones
  (identifier, lastModified), plus a couple of undeclared/residual properties
  (customProperty, customTags) that exist only in content, not in iap:TestEntity's
  own schema. HTL has no syntax for calling a method with an argument, so these are
  read off the resource's value map directly, the same underlying data source
  Content#get(String) reads from.
*/-->
<sly data-sly-use.entity="io.uhndata.iap.entities.models.Entity">
  <section id="entity">
    <h1>Sample node as Entity</h1>
    <dl>
      <dt>path</dt><dd id="entity-path">${entity.path}</dd>
      <dt>name</dt><dd id="entity-name">${entity.name}</dd>
      <dt>type</dt><dd id="entity-type">${entity.type}</dd>
      <dt>created</dt><dd id="entity-created">${entity.created}</dd>
      <dt>identifier</dt><dd id="entity-identifier">${entity.identifier}</dd>
      <dt>lastModified</dt><dd id="entity-lastModified">${entity.lastModified}</dd>
      <dt>title</dt><dd id="entity-title">${properties.title}</dd>
      <dt>customProperty</dt><dd id="entity-customProperty">${properties.customProperty}</dd>
      <dt>customTags</dt><dd id="entity-customTags">${properties.customTags @ join=', '}</dd>
    </dl>
  </section>
</sly>
