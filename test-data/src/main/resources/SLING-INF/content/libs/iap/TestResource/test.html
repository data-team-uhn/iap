<!--/*
  Renders a test resource through its ResourceModel, exercising both the inherited
  ItemModel accessors (path, name, created) and the iap:Resource-specific ones
  (identifier, lastModified).
*/-->
<sly data-sly-use.res="io.uhndata.iap.resources.models.ResourceModel">
  <section id="resource">
    <h1>Sample node as ResourceModel</h1>
    <dl>
      <dt>path</dt><dd id="resource-path">${res.path}</dd>
      <dt>name</dt><dd id="resource-name">${res.name}</dd>
      <dt>type</dt><dd id="resource-type">${res.type}</dd>
      <dt>created</dt><dd id="resource-created">${res.created}</dd>
      <dt>identifier</dt><dd id="resource-identifier">${res.identifier}</dd>
      <dt>lastModified</dt><dd id="resource-lastModified">${res.lastModified}</dd>
      <dt>title</dt><dd id="resource-title">${properties.title}</dd>
    </dl>
  </section>
</sly>
